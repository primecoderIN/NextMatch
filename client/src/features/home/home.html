<section class="relative flex min-h-screen items-center justify-center overflow-hidden bg-slate-950 px-6 pt-20 text-white">
  <div class="absolute -left-32 top-20 size-96 rounded-full bg-rose-500/20 blur-3xl"></div>
  <div class="absolute -right-32 bottom-10 size-96 rounded-full bg-indigo-500/25 blur-3xl"></div>

  @if (isRegisterModeOn) {
    <app-register
      class="relative z-10 w-full"
      [membersFromHome]="membersFromApp"
      (cancelRegister)="enableRegisterMode($event)"
    />
  } @else {
    <div class="relative z-10 mx-auto max-w-3xl text-center">
      <div class="mx-auto mb-6 flex size-24 items-center justify-center rounded-3xl bg-white/10 shadow-2xl ring-1 ring-white/15 backdrop-blur">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-14 text-rose-300">
          <path d="M4.5 6.375a4.125 4.125 0 1 1 8.25 0 4.125 4.125 0 0 1-8.25 0ZM14.25 8.625a3.375 3.375 0 1 1 6.75 0 3.375 3.375 0 0 1-6.75 0ZM1.5 19.125a7.125 7.125 0 0 1 14.25 0v.003l-.001.119a.75.75 0 0 1-.363.63 13.067 13.067 0 0 1-6.761 1.873c-2.472 0-4.786-.684-6.76-1.873a.75.75 0 0 1-.364-.63l-.001-.122ZM17.25 19.128l-.001.144a2.25 2.25 0 0 1-.233.96 10.088 10.088 0 0 0 5.06-1.01.75.75 0 0 0 .42-.643 4.875 4.875 0 0 0-6.957-4.611 8.586 8.586 0 0 1 1.71 5.157v.003Z" />
        </svg>
      </div>
      <p class="mb-4 text-sm font-semibold uppercase tracking-[0.35em] text-rose-300">Connections that matter</p>
      <h1 class="text-5xl font-bold tracking-tight sm:text-7xl">Find your next meaningful match.</h1>
      <p class="mx-auto max-w-2xl py-7 text-lg leading-8 text-slate-300">
        Discover people who share your interests, values, and sense of possibility. Your next
        conversation could be the start of something worth keeping.
      </p>
      <div class="flex flex-wrap items-center justify-center gap-3">
        <button
          (click)="enableRegisterMode(true)"
          class="rounded-xl bg-rose-500 px-6 py-3 font-semibold text-white shadow-lg shadow-rose-950/30 hover:bg-rose-400"
        >
          Create an account
        </button>
        <button class="rounded-xl border border-white/20 bg-white/5 px-6 py-3 font-semibold text-white hover:bg-white/10">
          Learn more
        </button>
      </div>
    </div>
  }
</section>
