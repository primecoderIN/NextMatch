<div class="card bg-base-100 w-1/2 mx-auto flex flex-col p-6 rounded-lg shadow-lg select-none">
  <div class="card-title justify-center text-3xl text-primary">Sign up</div>
  <div class="card-body w-full">
    <form [formGroup]="registerForm" class="flex flex-col gap-4 w-full" (ngSubmit)="register()">
      <app-text-input
        formControlName="userName"
        type="text"
        placeholder="Username"
        label="Username"
      />

      <app-text-input formControlName="email" type="email" placeholder="Email" label="Email" />

      <app-text-input
        formControlName="password"
        type="password"
        placeholder="Password"
        label="Password"
      />

      <app-text-input
        formControlName="confirmPassword"
        type="password"
        placeholder="Confirm Password"
        label="Confirm Password"
      />

      <div class="flex items-center justify-between">
        <button type="button" (click)="cancel()" class="btn btn-secondary">Cancel</button>
        <button [disabled]="!isValidForm" type="submit" class="btn btn-primary">Register</button>
      </div>
    </form>
  </div>
</div>
