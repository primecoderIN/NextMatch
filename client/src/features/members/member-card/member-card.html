@if (member(); as member) {
  <div
    routerLink="/members/{{ member.id }}"
    class="card cursor-pointer transition-all duration-300 ease-in-out transform hover:-translate-y-2"
  >
    <img [src]="member.imageUrl" [alt]="member.userName" class="rounded-lg h-50" />

    <div
      class="card-actions z-50 absolute bottom-0 w-full px-3 py-2 rounded-b-lg bg-linear-to-t from-black via-black/50 to black/0"
    >
      <div class="flex flex-col text-white">
        <span class="font-semibold">{{ member.userName }}, {{member.dateOfBirth |age}}</span>
        <span class="text-sm">{{ member.city }}</span>
      </div>
    </div>
  </div>
}
