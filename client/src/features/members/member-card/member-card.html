@if (member(); as member) {
  <article routerLink="/members/{{ member.id }}" class="group relative aspect-[4/5] cursor-pointer overflow-hidden rounded-2xl bg-slate-200 shadow-sm ring-1 ring-slate-200 transition duration-300 hover:-translate-y-1.5 hover:shadow-xl hover:shadow-slate-300/70">
    <img [src]="member.imageUrl || '/user.png'" [alt]="member.userName" class="h-full w-full object-cover transition duration-500 group-hover:scale-105" />

    <button class="absolute right-3 top-3 z-10 flex size-10 items-center justify-center rounded-full bg-white/90 p-2 text-rose-500 shadow-md backdrop-blur hover:bg-white" (click)="toggleLike($event)" aria-label="Toggle like">
      <svg [attr.fill]="hasLiked() ? 'currentColor' : 'none'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
      </svg>
    </button>

    <div class="absolute inset-x-0 bottom-0 bg-linear-to-t from-slate-950 via-slate-950/75 to-transparent px-4 pb-4 pt-16 text-white">
      <p class="text-lg font-semibold">{{ member.userName }}, {{ member.dateOfBirth | age }}</p>
      <p class="text-sm text-slate-200">{{ member.city }}</p>
    </div>
  </article>
}
