@if (member(); as member) {
  <div class="flex flex-col gap-3">
    <div class="flex gap-3">
      <span class="font-semibold"> Member since: </span>
      <span>{{ member.createdAt | date: 'longDate' }}</span>
    </div>
    <div class="flex gap-3">
      <span class="font-semibold"> Last active: </span>
      <span>{{ member.lastActive | date: 'dd MMM yyyy h:mm a' }}</span>
    </div>
    <h3 class="text-lg font-semibold text-primary">About {{ member.userName }}</h3>

    @if (memberService.isEditModeEnabled()) {
      <h1>Form code goes here</h1>
    } @else {
      <div>{{ member.description }}</div>
    }
  </div>
}
