@if (!memberService.isEditModeEnabled()) {
  @if (photos(); as photos) {
    @if (photos.length > 0) {
      <div class="grid grid-cols-4 auto-rows-min gap-3 p-5 h-65 overflow-auto">
        @for (photo of photos; track photo.id) {
          <img src="{{ photo.url }}" alt="photo of member" class="w-full rounded-lg" />
        }
      </div>
    } @else {
      <p class="text-center text-gray-500">No photos available for this member.</p>
    }
  }
} @else {
 <app-image-upload (uploadFile)="onImageUpload($event)" [loading]="isLoading()"></app-image-upload>
}
