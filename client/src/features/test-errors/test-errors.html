<section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
  <p class="text-xs font-semibold uppercase tracking-[0.2em] text-rose-500">Development tools</p>
  <h1 class="mt-1 text-2xl font-bold tracking-tight text-slate-900">API error testing</h1>
  <p class="mt-2 text-sm text-slate-500">Trigger common responses to verify the client error handling flow.</p>

  <div class="mt-6 flex flex-wrap gap-3">
    <button class="rounded-xl bg-slate-800 px-4 py-2.5 text-sm font-semibold text-white hover:bg-slate-900" (click)="get500Error()">Test 500 error</button>
    <button class="rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-indigo-700" (click)="get400Error()">Test 400 error</button>
    <button class="rounded-xl bg-rose-500 px-4 py-2.5 text-sm font-semibold text-white hover:bg-rose-600" (click)="get401Error()">Test 401 error</button>
    <button class="rounded-xl bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-emerald-700" (click)="get404Error()">Test 404 error</button>
    <button class="rounded-xl bg-amber-500 px-4 py-2.5 text-sm font-semibold text-white hover:bg-amber-600" (click)="get400ValidationError()">Test validation error</button>
  </div>

  @if (validationErrors().length > 0) {
    <div class="mt-6 rounded-xl border border-rose-200 bg-rose-50 p-4">
      <ul class="flex flex-col gap-1 text-sm text-rose-700">
        @for (error of validationErrors(); track $index) {
          <li>{{ error }}</li>
        }
      </ul>
    </div>
  }
</section>
