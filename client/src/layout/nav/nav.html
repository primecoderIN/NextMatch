    <!-- Navigation Links -->
    @if (accountService.isLoggedIn) {
      <nav class="flex gap-3 my-2 uppercase text-sm text-white select-none cursor-pointer">
        <a routerLinkActive="text-accent" routerLink="/members" class="hover:text-gray-300"
          >Members</a
        >
        <a routerLinkActive="text-accent" routerLink="/lists" class="hover:text-gray-300">Lists</a>
        <a routerLinkActive="text-accent" routerLink="/messages" class="hover:text-gray-300"
          >Messages</a
        >
         <a routerLinkActive="text-accent" routerLink="/errors" class="hover:text-gray-300"
          >Test Error</a
        >
      </nav>
    }

    <div class="flex ml-auto align-middle gap-3">
      @if (accountService.currentUser(); as user) {
        <div class="dropdown dropdown-end">
          <div
            tabindex="0"
            role="button"
            class="flex items-center text-white text-xl gap-2 cursor-pointer select-none"
          >
            <!-- <img src="./user.png" alt="avatar" class="size-6 rounded-box mr-2 text-white" /> -->
            <div
              class="w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center font-semibold text-lg"
            >
              {{ user?.userName?.charAt(0)?.toUpperCase() }}
            </div>
            <span class="mr-2 text-white text-sm">Welcome {{ user?.userName }}</span>
          </div>
          <ul
            tabindex="-1"
            class="dropdown-content mt-2 menu bg-base-100 rounded-box z-1 w-52 p-2 shadow-sm"
          >
            <li><a>Edit profile</a></li>
            <li (click)="logout()"><a>Logout</a></li>
          </ul>
        </div>
      } @else {
        <form #memberLoginFormData="ngForm" (ngSubmit)="login()" class="flex items-center gap-3">
          <input
            type="text"
            placeholder="Email"
            class="input input-bordered input-sm w-full max-w-xs"
            name="email"
            [(ngModel)]="credentials.email"
          />
          <input
            type="password"
            placeholder="Password"
            class="input input-bordered input-sm w-full max-w-xs"
            name="password"
            [(ngModel)]="credentials.password"
          />
          <button type="submit" class="btn btn-sm btn-primary">Login</button>
        </form>
      }
    </div>
  </div>
</header>
