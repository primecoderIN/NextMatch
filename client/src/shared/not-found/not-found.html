<div
  class="min-h-[80vh] select-none flex items-center justify-center bg-linear-to-br from-indigo-600 via-purple-600 to-fuchsia-600 px-4"
>
  <div class="bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl max-w-md w-full p-10 text-center">
    <!-- 404 -->
    <div
      class="text-7xl font-extrabold bg-linear-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent"
    >
      404
    </div>

    <!-- Title -->
    <h1 class="mt-4 text-2xl font-semibold text-gray-800">Page Not Found</h1>

    <!-- Description -->
    <p class="mt-3 text-gray-600 text-sm leading-relaxed">
      The page you are trying to access does not exist, has been removed, or the URL is incorrect.
    </p>

    <!-- Divider -->
    <div class="w-full h-px bg-linear-to-r from-transparent via-gray-300 to-transparent my-6"></div>

    <!-- Action -->
    <button

    (click)="goToHome()"
      class="cursor-pointer px-8 py-3 rounded-full font-medium text-white bg-linear-to-r from-indigo-600 to-purple-600 shadow-lg shadow-purple-500/30 transition-all duration-300 hover:scale-105 hover:shadow-xl hover:shadow-purple-500/40 active:scale-95"
    >
      Go Back Home
    </button>
  </div>
</div>
