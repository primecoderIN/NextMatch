<label class="flex w-full flex-col gap-1.5">
  <span class="text-sm font-medium text-slate-700">{{ label() }}</span>
  <input
    [formControl]="control"
    [type]="type()"
    [placeholder]="placeholder()"
    class="w-full rounded-xl border bg-white px-4 py-3 text-slate-800 shadow-sm outline-none transition placeholder:text-slate-400 focus:ring-2"
    [class.border-rose-400]="control.invalid && control.touched"
    [class.focus:border-rose-500]="control.invalid && control.touched"
    [class.focus:ring-rose-100]="control.invalid && control.touched"
    [class.border-emerald-400]="control.valid && control.touched"
    [class.focus:border-emerald-500]="control.valid && control.touched"
    [class.focus:ring-emerald-100]="control.valid && control.touched"
    [class.border-slate-200]="!control.touched"
    [class.focus:border-indigo-500]="!control.touched"
    [class.focus:ring-indigo-100]="!control.touched"
  />
  @if (control.invalid && control.touched) {
    <div class="text-xs font-medium text-rose-600">
      @for (error of getFormControlErrorInfo(); track $index) {
        <p>{{ error }}</p>
      }
    </div>
  }
</label>
