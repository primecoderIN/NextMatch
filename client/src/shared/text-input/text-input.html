<label
  class="input w-full"
  [class.input-error]="control.invalid && control.touched"
  [class.input-success]="control.valid && control.touched"
>
  <input [formControl]="control" [type]="type()" [placeholder]="placeholder()" />
  <div class="tooltip">
    <div class="tooltip-content">
      @if (getFormControlErrorInfo(); as errorInfo) {
        @for (error of errorInfo; track $index) {
          <p>{{ error }}</p>
        }
      }
    </div>
    @if (control.invalid && control.touched) {
      <button>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="size-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z"
          />
        </svg>
      </button>
    }
  </div>
</label>
