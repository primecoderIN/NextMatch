<div class="flex min-h-100 w-full flex-col gap-6 lg:flex-row">
  <div class="flex flex-1 items-center gap-4">
    <label
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"
      [class.border-purple-500]="isDragging"
      [class.border-dashed]="isDragging"
      [class.bg-purple-100]="isDragging"
      for="dropzone-file"
      class="flex h-full w-full cursor-pointer flex-col items-center justify-center rounded-2xl border-2 border-dashed border-slate-300 bg-slate-50 px-6 text-center transition hover:border-indigo-400 hover:bg-indigo-50"
    >
      <p class="mb-2 text-lg font-semibold text-slate-700">Click to upload or drop your photo here</p>
      <p class="text-sm text-slate-500">Choose a clear profile photo in JPG or PNG format.</p>
      <input id="dropzone-file" type="file" class="hidden" accept="image/*" (change)="onChange($event)" />
    </label>
  </div>

  @if (imageSrc()) {
    <div class="flex w-full flex-col gap-3 lg:w-1/3">
      <h3 class="text-lg font-semibold text-slate-800">Photo preview</h3>
      <div class="flex justify-center rounded-2xl border border-slate-200 bg-white p-2 shadow-sm">
        <img [src]="imageSrc()" alt="Preview" class="aspect-square rounded-xl object-cover" />
      </div>
      <div class="flex w-full gap-2">
        <button
          (click)="onCancel()"
          class="w-full cursor-pointer rounded-xl border border-slate-200 bg-white py-2.5 font-semibold text-slate-700 shadow-sm hover:bg-slate-50"
        >
          Cancel
        </button>
        <button
          [disabled]="loading()"
          (click)="onUpload()"
          class="w-full cursor-pointer rounded-xl bg-indigo-600 py-2.5 font-semibold text-white shadow-sm hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-60"
        >
          @if (loading()) {
            <span class="inline-block size-5 animate-spin rounded-full border-2 border-white/40 border-t-white"></span>
          } @else {
            Upload
          }
        </button>
      </div>
    </div>
  }
</div>
